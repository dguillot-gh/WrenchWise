services:
  postgres:
    image: postgres:17
    container_name: wrenchwise-postgres
    environment:
      POSTGRES_DB: wrenchwise
      POSTGRES_USER: wrenchwise
      POSTGRES_PASSWORD: wrenchwisepw
    volumes:
      - wrenchwise_pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: WrenchWise.Backend/Dockerfile
    container_name: wrenchwise-api
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__WrenchWiseDb: Host=postgres;Port=5432;Database=wrenchwise;Username=wrenchwise;Password=wrenchwisepw
    ports:
      - "18080:8080"
    restart: unless-stopped

volumes:
  wrenchwise_pgdata:
