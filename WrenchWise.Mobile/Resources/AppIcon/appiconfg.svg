<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
    <!-- Modern Classic Wrench Icon - Slate Theme -->
    <g transform="translate(228,228)">
        <!-- Ambient Logo Glow -->
        <circle cx="0" cy="0" r="140" fill="#38BDF8" opacity="0.15"/>
        <circle cx="0" cy="0" r="160" fill="none" stroke="#38BDF8" stroke-width="4" opacity="0.3"/>
        
        <g transform="rotate(45)">
            <!-- Top Head (Ring end) -->
            <circle cx="0" cy="-110" r="45" fill="#38BDF8"/>
            <!-- Hole within ring -->
            <circle cx="0" cy="-110" r="24" fill="#0f1922"/>
            
            <!-- Bottom Head (Open end) -->
            <circle cx="0" cy="110" r="45" fill="#38BDF8"/>
            <!-- Angled cutout for open end jaw -->
            <rect x="-20" y="90" width="40" height="80" rx="4" fill="#0f1922" transform="rotate(-15 0 110)"/>

            <!-- Main Handle Body -->
            <rect x="-24" y="-80" width="48" height="160" fill="#38BDF8"/>
            
            <!-- Handle Grip Indent for 3D realism -->
            <rect x="-10" y="-65" width="20" height="130" rx="10" fill="#0EA5E9"/>
            <!-- Grip inner shadow/highlight simulation -->
            <rect x="-6" y="-60" width="12" height="120" rx="6" fill="#0284C7"/>
        </g>
    </g>
</svg>